<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blackboard+ PDF Downloader</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="header-title">Blackboard+</div>
    <div class="header-sub">PDF Downloader</div>
  </div>

  <div class="body">
    <div class="step">
      <span class="num">1</span>
      <span>Acesse um <strong>curso</strong> no Blackboard</span>
    </div>
    <div class="step">
      <span class="num">2</span>
      <span>Clique no botao <strong>"PDFs"</strong> no canto inferior direito</span>
    </div>
    <div class="step">
      <span class="num">3</span>
      <span>Clique em <strong>"Escanear curso"</strong></span>
    </div>
    <div class="step">
      <span class="num">4</span>
      <span>Selecione os arquivos e <strong>baixe</strong></span>
    </div>
  </div>

  <div class="footer">
    <span class="version">v1.0.0</span>
  </div>
</body>
</html>
